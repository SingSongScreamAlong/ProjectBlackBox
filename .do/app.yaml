# =====================================================================
# DigitalOcean App Platform Specification
# BlackBox - AI-Powered iRacing Race Engineer
# =====================================================================

name: blackbox

region: nyc

# Environment variables shared across services
envs:
  - key: NODE_ENV
    value: production

services:
  # Monolith: Backend + Static Frontend
  - name: server
    github:
      repo: SingSongScreamAlong/ProjectBlackBox
      branch: main
      deploy_on_push: true
    source_dir: /
    # Build Frontend first, then Backend
    build_command: cd dashboard && npm install && npm run build && cd ../server && rm -rf dist && npm install && npm run build
    run_command: cd server && npm start
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /health
      initial_delay_seconds: 10
      period_seconds: 30
    routes:
      - path: /
    envs:
      - key: OPENAI_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: PORT
        value: "3000"
      - key: SERVER_URL
        scope: RUN_TIME
        value: "${APP_URL}"
      - key: BACKEND_URL
        scope: RUN_TIME
        value: "${APP_URL}"
      # Frontend Build Vars
      - key: REACT_APP_BACKEND_URL
        scope: BUILD_TIME
        value: "${APP_URL}"
      - key: REACT_APP_RELAY_AGENT_URL
        scope: BUILD_TIME
        value: "${APP_URL}"
      - key: REACT_APP_WEBSOCKET_URL
        scope: BUILD_TIME
        value: "${APP_URL}"
